[platformio]
src_dir = GoTree2_SensorBox/src
data_dir = GoTree2_SensorBox/data

[env:gotree2_main]
platform = espressif32
board = esp32dev
framework = arduino
extra_scripts = pre:scripts/patch_asyncwebsocket_oob.py
upload_port = COM5
monitor_port = COM5
monitor_speed = 115200
monitor_filters = time, esp32_exception_decoder
build_flags =
  -D CORE_DEBUG_LEVEL=1
  -D MAIN_FIRMWARE
  -I ${PROJECT_SRC_DIR}/config
  -I ${PROJECT_SRC_DIR}/core
  -I ${PROJECT_SRC_DIR}/drivers
  -I ${PROJECT_SRC_DIR}/sensors
  -I ${PROJECT_SRC_DIR}/ui
build_src_filter =
  +<*>
  -<../src_cam/**>
  -<test/**>
lib_deps =
  esphome/ESPAsyncWebServer-esphome @ ^3.1.0
  esphome/AsyncTCP-esphome @ ^2.0.1
  bblanchon/ArduinoJson
  adafruit/Adafruit BNO055
  adafruit/Adafruit Unified Sensor
  adafruit/Adafruit SSD1306
  adafruit/Adafruit GFX Library
  adafruit/Adafruit MCP4728 @ ^1.0.7
  adafruit/Adafruit MCP23017 Arduino Library @ ^2.3.0
  mikalhart/TinyGPSPlus

[env:gotree2_cam]
platform = espressif32
board = esp32cam
framework = arduino
extra_scripts = pre:scripts/patch_asyncwebsocket_oob.py
upload_port = COM7
monitor_port = COM7
monitor_speed = 115200
build_flags =
  -D CAMERA_FIRMWARE
  -I ${PROJECT_DIR}/GoTree2_SensorBox/src/config
build_src_filter =
  -<*>
  +<../src_cam/**>
